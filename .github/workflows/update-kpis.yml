name: Update COMEX Dashboard KPIs

on:
  schedule:
    - cron: '0 6 * * *'  # Tous les jours à 6h00 UTC (7h00 Paris)
  workflow_dispatch:      # Permet de lancer manuellement

jobs:
  update-kpis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure token
        id: get-token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://bcriholding.sharepoint.com/.default" \
            -d "grant_type=client_credentials" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch KPIs from SharePoint
  id: fetch_kpis
  run: |
    TOKEN="${{ steps.get_token.outputs.token }}"
    echo "Token length: ${#TOKEN}"
    
    RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
      "https://bcriholding.sharepoint.com/sites/cockpitdirection/_api/web/lists/getbytitle('KPIs')/items?\$select=Titre,Indicateur,Valeur,Delta,Tendance&\$orderby=Titre%20asc" \
      -H "Accept: application/json;odata=nometadata" \
      -H "Authorization: Bearer $TOKEN")
    
    echo "Full response: $RESPONSE"
    HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
    echo "HTTP Status: $HTTP_STATUS"
    
    BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
    echo "kpis=$BODY" >> $GITHUB_OUTPUT

      - name: Update index.html with new KPIs
        run: |
          python3 << 'EOF'
          import json
          import re
          import os

          # Parse KPIs
          kpis_raw = os.environ.get('KPIS_DATA', '{}')
          try:
              data = json.loads(kpis_raw)
              items = data.get('value', [])
          except:
              items = []

          if not items:
              print("No KPI data found, keeping existing values")
              exit(0)

          # Sort by Titre
          items.sort(key=lambda x: x.get('Titre', '0'))

          colors = ['var(--teal)', 'var(--blue)', 'var(--amber)', 'var(--purple)']
          kpi_html = ''
          for i, item in enumerate(items):
              indicateur = item.get('Indicateur', '')
              valeur = item.get('Valeur', '')
              delta = item.get('Delta', '')
              tendance = (item.get('Tendance') or '').lower()
              is_up = tendance == 'up'
              delta_class = 'up' if is_up else 'dn'
              arrow = '▲' if is_up else '▼'
              color = colors[i % len(colors)]
              kpi_html += f'''        <div class="kpi" style="border-top: 2px solid {color}">
                <div class="kpi-label">{indicateur}</div>
                <div class="kpi-value">{valeur}</div>
                <div class="kpi-delta {delta_class}">{arrow} {delta}</div>
              </div>
          '''

          # Read current index.html
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Replace KPI section between markers
          pattern = r'(<!-- KPI-START -->).*?(<!-- KPI-END -->)'
          replacement = f'<!-- KPI-START -->\n{kpi_html.strip()}\n  <!-- KPI-END -->'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          if new_content == content:
              print("Warning: KPI markers not found in index.html")
          else:
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f"Successfully updated {len(items)} KPIs")

          EOF
        env:
          KPIS_DATA: ${{ steps.fetch-kpis.outputs.kpis }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Mise à jour automatique des KPIs - $(date +'%d/%m/%Y %H:%M')"
          git push
